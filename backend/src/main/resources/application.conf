akka {
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  loglevel = "INFO"
  loglevel = ${?LOG_LEVEL}
  license-key = ""
  license-key = ${?AKKA_LICENSE_KEY}
}

helio.db {
  host = "localhost"
  host = ${?DB_HOST}
  port = 5432
  port = ${?DB_PORT}
  name = "helio"
  name = ${?DB_NAME}

  url = "jdbc:postgresql://"${helio.db.host}":"${helio.db.port}"/"${helio.db.name}
  url = ${?DATABASE_URL}

  user = ""
  user = ${?DB_USER}
  password = ""
  password = ${?DB_PASSWORD}

  driver = "org.postgresql.Driver"
  connectionPool = "HikariCP"

  # Cloud Run connection tuning
  # Cloud Run instances are ephemeral and scale horizontally. With the default
  # pool size of 10, many concurrent instances each holding 10 connections would
  # quickly exhaust Cloud SQL's connection limit (e.g. 10 instances × 10
  # connections = 100 connections consumed before any request is served).
  # Tuning strategy:
  #   maximumPoolSize = 5  — caps connections per instance; N instances × 5 is
  #                          the intentional horizontal-scale design
  #   minimumIdle     = 0  — release all idle connections between requests so
  #                          idle instances hold zero connections
  #   idleTimeout     = 30000 ms — evict idle connections after 30 s
  #   maxLifetime     = 60000 ms — recycle connections after 60 s, well within
  #                          Cloud SQL's idle-connection timeout, preventing
  #                          unexpected "connection reset" errors
  numThreads      = 5
  maximumPoolSize = 5
  minimumIdle     = 0
  idleTimeout     = 30000
  maxLifetime     = 60000
}
