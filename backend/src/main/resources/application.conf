pekko {
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  loglevel = "INFO"
  loglevel = ${?LOG_LEVEL}
}

helio.db {
  host = "localhost"
  host = ${?DB_HOST}
  port = 5432
  port = ${?DB_PORT}
  name = "helio"
  name = ${?DB_NAME}

  url = "jdbc:postgresql://"${helio.db.host}":"${helio.db.port}"/"${helio.db.name}
  url = ${?DATABASE_URL}

  user = ""
  user = ${?DB_USER}
  password = ""
  password = ${?DB_PASSWORD}

  driver = "org.postgresql.Driver"
  connectionPool = "HikariCP"

  # Send string parameters as JDBC type "unknown" so PostgreSQL applies
  # implicit coercion to the column type. Required for JSONB columns (HEL-132):
  # without this, PostgreSQL rejects VARCHAR parameters for JSONB columns with
  # "expression is of type character varying, expected jsonb".
  # Safe for all other column types — PostgreSQL coerces unknown → any type.
  properties.stringtype = "unspecified"

  # Cloud Run connection tuning
  # Cloud Run instances are ephemeral and scale horizontally. With the default
  # pool size of 10, many concurrent instances each holding 10 connections would
  # quickly exhaust Cloud SQL's connection limit (e.g. 10 instances × 10
  # connections = 100 connections consumed before any request is served).
  # Tuning strategy:
  #   maximumPoolSize = 5  — caps connections per instance; N instances × 5 is
  #                          the intentional horizontal-scale design
  #   minimumIdle     = 0  — release all idle connections between requests so
  #                          idle instances hold zero connections
  #   idleTimeout     = 30000 ms — evict idle connections after 30 s
  #   maxLifetime     = 60000 ms — recycle connections after 60 s, well within
  #                          Cloud SQL's idle-connection timeout, preventing
  #                          unexpected "connection reset" errors
  numThreads      = 5
  maximumPoolSize = 5
  minimumIdle     = 0
  idleTimeout     = 30000
  maxLifetime     = 60000

  # HEL-274: privileged pool — connections assume the helio_privileged role
  # (BYPASSRLS) on checkout. Used exclusively by DbContext.withSystemContext.
  # Inherits url, driver, and stringtype from the parent stanza; the only
  # difference is connectionInitSql which switches the session role.
  privileged {
    url      = ${helio.db.url}
    driver   = ${helio.db.driver}

    connectionPool = "HikariCP"

    # Assume the BYPASSRLS role for the lifetime of the connection.
    # SET ROLE (without LOCAL) is correct here: HikariCP uses this as the
    # pool-level init SQL, applied once when the physical connection is
    # opened, not inside a transaction. The role persists for that physical
    # connection until it is closed or recycled by the pool.
    connectionInitSql = "SET ROLE helio_privileged"

    # Send string parameters as JDBC type "unknown" — same as the app pool.
    properties.stringtype = "unspecified"

    # Match app-pool Cloud Run tuning so total max connections per instance
    # is 10 (5 app + 5 privileged). System-context calls are infrequent so
    # the privileged pool will typically hold zero idle connections.
    numThreads      = 5
    maximumPoolSize = 5
    minimumIdle     = 0
    idleTimeout     = 30000
    maxLifetime     = 60000
  }
}

spark {
  # Default to local mode; set SPARK_MASTER_URL=spark://host:7077 to use a cluster
  masterUrl = "local[*]"
  masterUrl = ${?SPARK_MASTER_URL}

  # Local-mode performance tuning (p95 < 2s panel load time target)
  # spark.sql.shuffle.partitions — default 200 is excessive for single-node local; 4 is optimal
  # spark.default.parallelism   — controls RDD parallelism for local mode
  # spark.ui.enabled            — disabled to reduce SparkSession startup overhead
  # These values are applied programmatically in SparkJobSubmitter; listed here for reference
  # and can be overridden by environment-specific cluster configuration.
  shufflePartitions = 4
  shufflePartitions = ${?SPARK_SHUFFLE_PARTITIONS}
  defaultParallelism = 4
  defaultParallelism = ${?SPARK_DEFAULT_PARALLELISM}
}
