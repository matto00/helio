schema: spec-driven

context: |
  ## Tech Stack

  **Frontend**: React 18, Redux Toolkit (createAsyncThunk for all API calls), TypeScript, Vite, React Grid Layout, React Router, Axios, Jest + React Testing Library
  **Backend**: Scala, Akka HTTP (routes + directives), Slick (database access layer), HikariCP, Flyway (migrations), Spray JSON (serialization), ScalaTest + Akka HTTP TestKit + EmbeddedPostgres
  **Database**: PostgreSQL. Flyway migrations in `backend/src/main/resources/db/migration/`. Current schema: dashboards, panels, data_types, data_sources, data_source_schemas, users (V6), user_sessions (V7).

  ## Architecture

  Request flow: React Component → Redux thunk → Axios service → Vite proxy → Akka HTTP route → Slick repository → PostgreSQL

  - `ApiRoutes.scala` composes all sub-routers. Sub-routers live in `api/routes/`.
  - `JsonProtocols.scala` holds all Spray JSON formatters.
  - `RequestValidation.scala` normalises and validates inputs before they reach repositories.
  - Domain models: value-class ID wrappers (`DashboardId`, `PanelId`, `DataTypeId`, `DataSourceId`, `UserId`), immutable case classes, `ResourceMeta` for timestamps and `createdBy`.
  - Infrastructure: one repository trait + Slick implementation per domain entity in `infrastructure/`.
  - Frontend state: Redux slices per feature (`dashboardsSlice`, `panelsSlice`, `dataTypesSlice`, `dataSourcesSlice`). `markDashboardPanelsStale` pattern for cache invalidation.

  ## Conventions

  - Commit prefix: `HEL-N Description`
  - Branch format: `[feature|task|bug]/[3-5-word-description]/[ticket-id]`
  - Zero-warnings ESLint policy; Prettier formatting enforced by Husky pre-commit hook
  - No `any` in TypeScript without documented justification
  - Backend: no blocking operations in Akka execution context
  - Tests run against EmbeddedPostgres (backend) and jest-environment-jsdom (frontend)
  - API contracts defined in `schemas/` (JSON Schema 2020-12) and `openspec/specs/`

  ## Key Endpoints (current)

  Public: `GET /health`
  Dashboards: `GET/POST /api/dashboards`, `PATCH/DELETE /api/dashboards/:id`, `POST /api/dashboards/:id/duplicate`, `GET /api/dashboards/:id/export`, `POST /api/dashboards/import`
  Panels: `GET /api/dashboards/:id/panels`, `POST /api/panels`, `PATCH/DELETE /api/panels/:id`, `POST /api/panels/:id/duplicate`
  DataTypes: `GET/POST /api/data-types`, `PATCH/DELETE /api/data-types/:id`
  DataSources: `GET/POST /api/data-sources`, `GET/DELETE /api/data-sources/:id`, `GET /api/data-sources/:id/sources`
  Auth (HEL-33, pending merge): `POST /api/auth/register`, `POST /api/auth/login`, `POST /api/auth/logout`

rules:
  proposal:
    - Keep under 300 words — focus on what changes and why, not implementation details
    - Include a "Non-goals" section for anything explicitly out of scope
  design:
    - Ground every decision in actual files/patterns from the codebase, not hypotheticals
    - Document self-approved decisions under a "## Planner Notes" section
  tasks:
    - Each task must be completable in a single focused session (no multi-hour tasks)
    - Backend tasks first, then frontend, then tests — never interleave
    - Tests are their own task group at the end, not sprinkled throughout
    - 'Prefix task group headings with the area: "### Backend", "### Frontend", "### Tests"'
